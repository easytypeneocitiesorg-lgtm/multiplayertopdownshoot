<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:black;">
<canvas id="gameCanvas"></canvas>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, push, onChildAdded, onChildRemoved, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7GgVCBMXX7-L66U",
    authDomain: "multiplayerfps-c3b14.firebaseapp.com",
    projectId: "multiplayerfps-c3b14",
    storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
    messagingSenderId: "77451030161",
    appId: "1:77451030161:web:6d49eb99683605ba491930",
    measurementId: "G-SS2V9LRY5E"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const myId = "p_" + Math.random().toString(36).substr(2, 9);
  let player = { x: 100, y: 100, health: 5 };
  let allPlayers = {};
  let bullets = {};
  let keys = {};
  let lastShot = 0;

  window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

  // Sync Players and Bullets
  onValue(ref(db, 'players/'), (snap) => { allPlayers = snap.val() || {}; });
  onValue(ref(db, 'bullets/'), (snap) => { bullets = snap.val() || {}; });

  // Shooting: Create bullet object
  window.addEventListener('mousedown', (e) => {
    if (Date.now() - lastShot < 20) return; // 20ms delay
    lastShot = Date.now();
    push(ref(db, 'bullets/'), {
      x: player.x, y: player.y,
      vx: (e.clientX - player.x) / 20,
      vy: (e.clientY - player.y) / 20,
      owner: myId
    });
  });

  function gameLoop() {
    // Movement
    if (keys['w']) player.y -= 2;
    if (keys['s']) player.y += 2;
    if (keys['a']) player.x -= 2;
    if (keys['d']) player.x += 2;
    update(ref(db, 'players/' + myId), player);

    // Render
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Players
    Object.entries(allPlayers).forEach(([id, p]) => {
      ctx.fillStyle = (id === myId) ? "blue" : "red";
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw/Update Bullets
    Object.entries(bullets).forEach(([id, b]) => {
      b.x += b.vx; b.y += b.vy;
      ctx.fillStyle = "yellow";
      ctx.fillRect(b.x, b.y, 4, 4);
      
      // Collision (Only owner of the game client checks hits to avoid double-counting)
      Object.entries(allPlayers).forEach(([pid, p]) => {
        if (Math.hypot(b.x - p.x, b.y - p.y) < 15 && pid !== b.owner) {
          if (pid === myId) { // Only update if I am the one being hit
            let newH = Math.max(0, player.health - 1);
            if (newH === 0) {
              player = { x: Math.random() * 500, y: Math.random() * 500, health: 5 };
            } else {
              player.health = newH;
            }
            update(ref(db, 'players/' + myId), player);
          }
        }
      });
    });
    requestAnimationFrame(gameLoop);
  }

  // Init
  const pRef = ref(db, 'players/' + myId);
  set(pRef, player);
  onDisconnect(pRef).remove();
  gameLoop();
</script>
</body>
</html>
