<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Shooter Multiplayer</title>
<style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { background:#111; display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* -------------------- FIREBASE CONFIG -------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7GgVCBMXX7-L66U",
  authDomain: "multiplayerfps-c3b14.firebaseapp.com",
  databaseURL: "https://multiplayerfps-c3b14-default-rtdb.firebaseio.com",
  projectId: "multiplayerfps-c3b14",
  storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
  messagingSenderId: "77451030161",
  appId: "1:77451030161:web:6d49eb99683605ba491930",
  measurementId: "G-SS2V9LRY5E"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* -------------------- CANVAS -------------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* -------------------- PLAYER -------------------- */
const id = "player_" + Math.random().toString(36).slice(2);
let players = {};
let bullets = {};

let me = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    health: 5,
    angle: 0,
    alive: true,
    heartbeat: Date.now()
};

let keys = {};
let lastShot = 0;
const speed = 3;

/* -------------------- INPUT -------------------- */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("mousemove", e => {
    me.angle = Math.atan2(e.clientY - me.y, e.clientX - me.x);
});

canvas.addEventListener("mousedown", () => shoot());

/* -------------------- SHOOT -------------------- */
function shoot() {
    if (!me.alive) return;

    const now = performance.now();
    if (now - lastShot < 5) return;
    lastShot = now;

    const bid = "b_" + Math.random().toString(36).slice(2);

    // Only create bullets in Firebase, no local duplication
    set(ref(db, "bullets/" + bid), {
        id: bid,
        owner: id,
        x: me.x,
        y: me.y,
        angle: me.angle,
        speed: 10
    });
}

/* -------------------- MOVEMENT -------------------- */
function updateMe() {
    if (!me.alive) return;

    if (keys["w"] || keys["ArrowUp"]) me.y -= speed;
    if (keys["s"] || keys["ArrowDown"]) me.y += speed;
    if (keys["a"] || keys["ArrowLeft"]) me.x -= speed;
    if (keys["d"] || keys["ArrowRight"]) me.x += speed;

    me.x = Math.max(15, Math.min(canvas.width - 15, me.x));
    me.y = Math.max(15, Math.min(canvas.height - 15, me.y));

    me.heartbeat = Date.now();
    update(ref(db, "players/" + id), me);
}

/* -------------------- DRAW -------------------- */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const pid in players) {
        const p = players[pid];
        if (!p || !p.alive) continue;

        ctx.fillStyle = pid === id ? "#00ffff" : "red";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(p.health, p.x - 5, p.y - 20);
    }

    for (const bid in bullets) {
        const b = bullets[bid];
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

/* -------------------- BULLET PHYSICS -------------------- */
function updateBullets() {
    for (const bid in bullets) {
        const b = bullets[bid];

        // Client-only movement (fixes spray)
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;

        // Hit detection
        for (const pid in players) {
            const p = players[pid];
            if (!p || !p.alive) continue;
            if (pid === b.owner) continue;

            const dx = p.x - b.x;
            const dy = p.y - b.y;
            if (dx * dx + dy * dy < 20 * 20) {
                const newHealth = p.health - 1;

                update(ref(db, "players/" + pid), { health: newHealth });

                if (newHealth <= 0) {
                    respawnPlayer(pid);
                }

                remove(ref(db, "bullets/" + bid));
                delete bullets[bid];
                break;
            }
        }

        // Off-screen
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            remove(ref(db, "bullets/" + bid));
            delete bullets[bid];
        }
    }
}

/* -------------------- RESPAWN -------------------- */
function respawnPlayer(pid) {
    update(ref(db, "players/" + pid), { alive: false });

    setTimeout(() => {
        const px = Math.random() * canvas.width;
        const py = Math.random() * canvas.height;

        update(ref(db, "players/" + pid), {
            x: px,
            y: py,
            health: 5,
            alive: true
        });
    }, 3000);
}

/* -------------------- HEARTBEAT CLEANUP -------------------- */
setInterval(() => {
    for (const pid in players) {
        const p = players[pid];
        if (!p) continue;

        if (Date.now() - p.heartbeat > 3000) {
            remove(ref(db, "players/" + pid));
        }
    }
}, 1000);

/* -------------------- MULTIPLAYER SYNC -------------------- */
onValue(ref(db, "players"), snap => players = snap.val() || {});
onValue(ref(db, "bullets"), snap => bullets = snap.val() || {});

/* -------------------- REGISTER PLAYER -------------------- */
set(ref(db, "players/" + id), me);

/* -------------------- GAME LOOP -------------------- */
function loop() {
    updateMe();
    updateBullets();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
