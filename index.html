<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Shooter Multiplayer</title>
<style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { background:#111; display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* -------------------- FIREBASE CONFIG -------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7GgVCBMXX7-L66U",
  authDomain: "multiplayerfps-c3b14.firebaseapp.com",
  databaseURL: "https://multiplayerfps-c3b14-default-rtdb.firebaseio.com",
  projectId: "multiplayerfps-c3b14",
  storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
  messagingSenderId: "77451030161",
  appId: "1:77451030161:web:6d49eb99683605ba491930",
  measurementId: "G-SS2V9LRY5E"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* -------------------- CANVAS -------------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* -------------------- PLAYER -------------------- */
const id = "player_" + Math.random().toString(36).slice(2);

let players = {};      // health + alive
let positions = {};    // x + y + angle
let bullets = [];      // local bullets only

let me = {
    health: 5,
    alive: true,
    heartbeat: Date.now()
};

let myPos = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    angle: 0
};

let keys = {};
let lastShot = 0;
const speed = 3;

/* -------------------- INPUT -------------------- */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("mousemove", e => {
    myPos.angle = Math.atan2(e.clientY - myPos.y, e.clientX - myPos.x);
});

canvas.addEventListener("mousedown", () => shoot());

/* -------------------- SHOOT -------------------- */
function shoot() {
    if (!me.alive) return;

    const now = performance.now();
    if (now - lastShot < 5) return;
    lastShot = now;

    bullets.push({
        owner: id,
        x: myPos.x,
        y: myPos.y,
        angle: myPos.angle,
        speed: 10
    });

    push(ref(db, "shots"), {
        owner: id,
        x: myPos.x,
        y: myPos.y,
        angle: myPos.angle
    });
}

/* -------------------- RECEIVE SHOTS -------------------- */
onValue(ref(db, "shots"), snap => {
    const data = snap.val();
    if (!data) return;

    for (const sid in data) {
        const s = data[sid];
        if (!s) continue;

        if (s.owner !== id) {
            bullets.push({
                owner: s.owner,
                x: s.x,
                y: s.y,
                angle: s.angle,
                speed: 10
            });
        }
    }
});

/* -------------------- MOVEMENT -------------------- */
function updateMovement() {
    if (!me.alive) return;

    if (keys["w"] || keys["ArrowUp"]) myPos.y -= speed;
    if (keys["s"] || keys["ArrowDown"]) myPos.y += speed;
    if (keys["a"] || keys["ArrowLeft"]) myPos.x -= speed;
    if (keys["d"] || keys["ArrowRight"]) myPos.x += speed;

    myPos.x = Math.max(15, Math.min(canvas.width - 15, myPos.x));
    myPos.y = Math.max(15, Math.min(canvas.height - 15, myPos.y));

    update(ref(db, "positions/" + id), myPos);

    me.heartbeat = Date.now();
    update(ref(db, "players/" + id), me);
}

/* -------------------- DRAW -------------------- */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const pid in players) {
        const p = players[pid];
        const pos = positions[pid];
        if (!p || !pos || !p.alive) continue;

        ctx.fillStyle = pid === id ? "#00ffff" : "red";
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(p.health, pos.x - 5, pos.y - 20);
    }

    for (const b of bullets) {
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

/* -------------------- BULLET PHYSICS -------------------- */
function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];

        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;

        for (const pid in players) {
            const p = players[pid];
            const pos = positions[pid];
            if (!p || !pos || !p.alive) continue;
            if (pid === b.owner) continue;

            const dx = pos.x - b.x;
            const dy = pos.y - b.y;
            if (dx * dx + dy * dy < 20 * 20) {
                const newHealth = p.health - 1;

                update(ref(db, "players/" + pid), { health: newHealth });

                if (newHealth <= 0) respawn(pid);

                bullets.splice(i, 1);
                break;
            }
        }

        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(i, 1);
        }
    }
}

/* -------------------- RESPAWN -------------------- */
function respawn(pid) {
    update(ref(db, "players/" + pid), { alive: false });

    setTimeout(() => {
        const px = Math.random() * canvas.width;
        const py = Math.random() * canvas.height;

        update(ref(db, "positions/" + pid), {
            x: px,
            y: py,
            angle: 0
        });

        update(ref(db, "players/" + pid), {
            health: 5,
            alive: true
        });
    }, 3000);
}

/* -------------------- HEARTBEAT CLEANUP -------------------- */
setInterval(() => {
    for (const pid in players) {
        const p = players[pid];
        if (!p) continue;

        if (Date.now() - p.heartbeat > 3000) {
            remove(ref(db, "players/" + pid));
            remove(ref(db, "positions/" + pid));
        }
    }
}, 1000);

/* -------------------- MULTIPLAYER SYNC -------------------- */
onValue(ref(db, "players"), snap => players = snap.val() || {});
onValue(ref(db, "positions"), snap => positions = snap.val() || {});

/* -------------------- REGISTER PLAYER -------------------- */
set(ref(db, "players/" + id), me);
set(ref(db, "positions/" + id), myPos);

/* -------------------- GAME LOOP -------------------- */
function loop() {
    updateMovement();
    updateBullets();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
