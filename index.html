<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Shooter Multiplayer</title>
<style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { background:#111; display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* -------------------- FIREBASE CONFIG -------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7GgVCBMXX7-L66U",
  authDomain: "multiplayerfps-c3b14.firebaseapp.com",
  databaseURL: "https://multiplayerfps-c3b14-default-rtdb.firebaseio.com",
  projectId: "multiplayerfps-c3b14",
  storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
  messagingSenderId: "77451030161",
  appId: "1:77451030161:web:6d49eb99683605ba491930",
  measurementId: "G-SS2V9LRY5E"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* -------------------- CANVAS -------------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

/* -------------------- PLAYER -------------------- */
const id = "player_" + Math.random().toString(36).slice(2);
let players = {};
let bullets = {};

let me = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    health: 5,
    angle: 0
};

let keys = {};
let lastShot = 0;
const speed = 3;

/* -------------------- INPUT -------------------- */
document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    me.angle = Math.atan2(my - me.y, mx - me.x);
});

canvas.addEventListener("mousedown", () => {
    shoot();
});

/* -------------------- SHOOT -------------------- */
function shoot() {
    const now = performance.now();
    if (now - lastShot < 5) return; // 5 ms delay
    lastShot = now;

    const bid = "b_" + Math.random().toString(36).slice(2);

    // ONLY write to Firebase, no local bullets[bid] here
    set(ref(db, "bullets/" + bid), {
        id: bid,
        owner: id,
        x: me.x,
        y: me.y,
        angle: me.angle,
        speed: 10
    });
}

/* -------------------- MOVEMENT -------------------- */
function updateMe() {
    if (keys["w"] || keys["ArrowUp"]) me.y -= speed;
    if (keys["s"] || keys["ArrowDown"]) me.y += speed;
    if (keys["a"] || keys["ArrowLeft"]) me.x -= speed;
    if (keys["d"] || keys["ArrowRight"]) me.x += speed;

    // clamp to screen
    me.x = Math.max(15, Math.min(canvas.width - 15, me.x));
    me.y = Math.max(15, Math.min(canvas.height - 15, me.y));

    update(ref(db, "players/" + id), me);
}

/* -------------------- DRAW -------------------- */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // players
    for (const pid in players) {
        const p = players[pid];
        if (!p) continue;

        ctx.fillStyle = pid === id ? "#00ffff" : "red";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(p.health ?? 0, p.x - 5, p.y - 20);
    }

    // bullets
    for (const bid in bullets) {
        const b = bullets[bid];
        if (!b) continue;

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    // debug overlay
    ctx.fillStyle = "white";
    ctx.fillText(`x:${me.x} y:${me.y}`, 20, 20);
}

/* -------------------- BULLET PHYSICS -------------------- */
function updateBullets() {
    for (const bid in bullets) {
        const b = bullets[bid];
        if (!b) continue;

        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;

        // hit detection
        for (const pid in players) {
            if (pid === b.owner) continue;
            const p = players[pid];
            if (!p) continue;

            const dx = p.x - b.x;
            const dy = p.y - b.y;
            if (dx * dx + dy * dy < 20 * 20) {
                const newHealth = (p.health ?? 5) - 1;
                update(ref(db, "players/" + pid), { health: newHealth });
                remove(ref(db, "bullets/" + bid));
                delete bullets[bid];
                break;
            }
        }

        // off-screen
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            remove(ref(db, "bullets/" + bid));
            delete bullets[bid];
        }
    }
}

/* -------------------- MULTIPLAYER SYNC -------------------- */
onValue(ref(db, "players"), snap => {
    players = snap.val() || {};
});

onValue(ref(db, "bullets"), snap => {
    bullets = snap.val() || {};
});

/* -------------------- REGISTER PLAYER -------------------- */
set(ref(db, "players/" + id), me);

/* -------------------- GAME LOOP -------------------- */
function loop() {
    updateMe();
    updateBullets();
    draw();
    requestAnimationFrame(loop);
}
loop();

/* -------------------- CLEANUP -------------------- */
window.addEventListener("beforeunload", () => {
    remove(ref(db, "players/" + id));
});
</script>
</body>
</html>
