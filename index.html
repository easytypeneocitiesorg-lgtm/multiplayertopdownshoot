<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Shooter Multiplayer</title>
<style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { background:#111; display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, update, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7gVCBMXX7-L66U",
    authDomain: "multiplayerfps-c3b14.firebaseapp.com",
    databaseURL: "https://multiplayerfps-c3b14-default-rtdb.firebaseio.com",
    projectId: "multiplayerfps-c3b14",
    storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
    messagingSenderId: "77451030161",
    appId: "1:77451030161:web:6d49eb99683605ba491930",
    measurementId: "G-SS2V9LRY5E"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// --- Game Logic ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const id = "player_" + crypto.randomUUID();
let players = {}, positions = {}, bullets = {};
let myPos = { x: canvas.width/2, y: canvas.height/2, angle: 0 };
const speed = 3;
let keys = {};

onValue(ref(db, "players"), snap => players = snap.val() || {});
onValue(ref(db, "positions"), snap => positions = snap.val() || {});

async function joinGame() {
    await set(ref(db, "players/" + id), { alive: true, heartbeat: Date.now() });
    await set(ref(db, "positions/" + id), myPos);
    onDisconnect(ref(db, "players/" + id)).remove();
    onDisconnect(ref(db, "positions/" + id)).remove();
}
joinGame();

function shoot() {
    push(ref(db, "bullets"), { x: myPos.x, y: myPos.y, angle: myPos.angle, sender: id });
}

function updateMovement() {
    if (keys["w"]) myPos.y -= speed;
    if (keys["s"]) myPos.y += speed;
    if (keys["a"]) myPos.x -= speed;
    if (keys["d"]) myPos.x += speed;
    update(ref(db, "positions/" + id), myPos);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let pId in positions) {
        let p = positions[pId];
        ctx.fillStyle = pId === id ? "lime" : "red";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fill();
    }
    updateMovement();
    requestAnimationFrame(draw);
}

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener("mousedown", shoot);

draw();
</script>
</body>
</html>
