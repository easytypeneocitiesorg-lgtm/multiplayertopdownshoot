<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Shooter Multiplayer</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#000;
}

canvas {
    background:#111;
    display:block;
}
</style>

</head>

<body>

<canvas id="game"></canvas>


<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";


import {
getDatabase,
ref,
onValue,
set,
update,
remove,
push,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";



/* ================= FIREBASE ================= */


const firebaseConfig = {

apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7gVCBMXX7-L66U",

authDomain:
"multiplayerfps-c3b14.firebaseapp.com",

databaseURL:
"https://multiplayerfps-c3b14-default-rtdb.firebaseio.com",

projectId:
"multiplayerfps-c3b14",

storageBucket:
"multiplayerfps-c3b14.firebasestorage.app",

messagingSenderId:
"77451030161",

appId:
"1:77451030161:web:6d49eb99683605ba491930",

measurementId:
"G-SS2V9LRY5E"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);





/* ================= CANVAS ================= */


const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");


canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;



window.addEventListener("resize",()=>{

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

});





/* ================= PLAYER ================= */


const id =
"player_" + crypto.randomUUID();



let players = {};

let positions = {};

let bullets = [];



let me = {

health:5,

alive:true,

heartbeat:Date.now()

};



let myPos = {

x:canvas.width/2,

y:canvas.height/2,

angle:0

};



const speed = 3;


let keys = {};

let lastShot = 0;





/* ================= JOIN GAME ================= */


async function joinGame(){


await set(
ref(db,"players/"+id),
me
);


await set(
ref(db,"positions/"+id),
myPos
);



onDisconnect(
ref(db,"players/"+id)
)
.remove();


onDisconnect(
ref(db,"positions/"+id)
)
.remove();



}


joinGame();





/* ================= FIREBASE LISTENERS ================= */


onValue(
ref(db,"players"),
snap=>{

players =
snap.val() || {};

});


onValue(
ref(db,"positions"),
snap=>{

positions =
snap.val() || {};

});





/* ================= POSITION SYNC ================= */


let lastSync = 0;



function syncPosition(){


const now =
performance.now();


if(now-lastSync < 100)
return;


lastSync = now;



update(
ref(db,"positions/"+id),
myPos
);


}





/* ================= HEARTBEAT ================= */


setInterval(()=>{


update(
ref(db,"players/"+id),
{
heartbeat:Date.now()
}
);


},1000);





/* ================= INPUT ================= */


document.addEventListener(
"keydown",
e=>{

keys[e.key.toLowerCase()] = true;

});


document.addEventListener(
"keyup",
e=>{

keys[e.key.toLowerCase()] = false;

});



canvas.addEventListener(
"mousemove",
e=>{

myPos.angle =
Math.atan2(
e.clientY-myPos.y,
e.clientX-myPos.x
);

});



canvas.addEventListener(
"mousedown",
()=>shoot()
);





/* ================= MOVEMENT ================= */


function updateMovement(){


if(!me.alive)
return;



if(keys["w"] || keys["arrowup"])
myPos.y -= speed;


if(keys["s"] || keys["arrowdown"])
myPos.y += speed;


if(keys["a"] || keys["arrowleft"])
myPos.x -= speed;


if(keys["d"] || keys["arrowright"])
myPos.x += speed;



myPos.x =
Math.max(
15,
Math.min(
canvas.width-15,
myPos.x
)
);


myPos.y =
Math.max(
15,
Math.min(
canvas.height-15,
myPos.y
)
);



syncPosition();


}
