<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:black;">
<canvas id="gameCanvas"></canvas>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, push, onChildAdded, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7GgVCBMXX7-L66U",
    authDomain: "multiplayerfps-c3b14.firebaseapp.com",
    projectId: "multiplayerfps-c3b14",
    storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
    messagingSenderId: "77451030161",
    appId: "1:77451030161:web:6d49eb99683605ba491930",
    measurementId: "G-SS2V9LRY5E"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const myId = "p_" + Math.random().toString(36).substr(2, 9);
  let player = { x: 100, y: 100, health: 5, respawning: false };
  let allPlayers = {};
  let keys = {};
  let lastShot = 0;

  // Track Keys
  window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

  // Sync Data
  onValue(ref(db, 'players/'), (snapshot) => { allPlayers = snapshot.val() || {}; });

  // Handle Shooting (Local Calculation)
  window.addEventListener('mousedown', (e) => {
    if (Date.now() - lastShot < 5) return; // 5ms delay
    lastShot = Date.now();
    
    // Check collisions locally to save bandwidth
    Object.entries(allPlayers).forEach(([id, p]) => {
      if (id !== myId && Math.hypot(e.clientX - p.x, e.clientY - p.y) < 20) {
        let newHealth = p.health - 1;
        if (newHealth <= 0) {
          update(ref(db, 'players/' + id), { health: 5, x: Math.random() * 500, y: Math.random() * 500 });
        } else {
          update(ref(db, 'players/' + id), { health: newHealth });
        }
      }
    });
  });

  // Game Loop
  function updateGame() {
    if (!player.respawning) {
      if (keys['w']) player.y -= 5;
      if (keys['s']) player.y += 5;
      if (keys['a']) player.x -= 5;
      if (keys['d']) player.x += 5;
      update(ref(db, 'players/' + myId), player);
    }

    // Draw
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    Object.entries(allPlayers).forEach(([id, p]) => {
      ctx.fillStyle = (id === myId) ? "blue" : "red";
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.fillText(p.health, p.x - 5, p.y - 15);
    });
    requestAnimationFrame(updateGame);
  }

  // Setup Player
  const pRef = ref(db, 'players/' + myId);
  set(pRef, player);
  onDisconnect(pRef).remove();
  updateGame();
</script>
</body>
</html>
